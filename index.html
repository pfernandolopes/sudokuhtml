<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sudoku</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { background: #1c1b22; }

body {
background: #1c1b22;
color: #f0ebe0;
font-family: -apple-system, ‘SF Pro Display’, sans-serif;
min-height: 100dvh;
display: flex;
flex-direction: column;
align-items: center;
overflow-x: hidden;
}

.header {
width: 100%;
max-width: 420px;
display: flex;
justify-content: space-between;
align-items: center;
padding: 52px 20px 10px;
}

.logo {
font-size: 30px;
font-weight: 800;
letter-spacing: -1px;
color: #fff;
}
.logo span { color: #f5c542; }

.timer-box { text-align: right; }
.timer {
font-size: 22px;
font-weight: 700;
color: #fff;
letter-spacing: 1px;
font-variant-numeric: tabular-nums;
}
.diff-label {
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
color: #f5c542;
font-weight: 600;
}

.diff-row {
width: 100%;
max-width: 420px;
display: flex;
gap: 8px;
padding: 6px 16px;
}

.diff-btn {
flex: 1;
padding: 8px 0;
border-radius: 10px;
border: none;
font-size: 11px;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
cursor: pointer;
background: #2a2933;
color: #666;
transition: all 0.15s;
}
.diff-btn.active { background: #f5c542; color: #1c1b22; }

.stats {
width: 100%;
max-width: 420px;
display: flex;
justify-content: center;
gap: 28px;
padding: 4px 16px 8px;
}
.stat { font-size: 11px; color: #666; letter-spacing: 1px; text-transform: uppercase; }
.stat b { color: #f0ebe0; font-weight: 700; }

/* BOARD */
.board-wrap {
width: 100%;
max-width: 420px;
padding: 0 12px;
}

#board {
width: 100%;
aspect-ratio: 1;
display: grid;
grid-template-columns: repeat(9, 1fr);
grid-template-rows: repeat(9, 1fr);
border: 3px solid #f5c542;
border-radius: 12px;
overflow: hidden;
/* gap creates thin lines between cells */
background: #2e2c38;
gap: 1px;
}

.cell {
background: #23222a;
display: flex;
align-items: center;
justify-content: center;
font-size: clamp(14px, 4.2vw, 20px);
font-weight: 600;
cursor: pointer;
position: relative;
user-select: none;
}

/* thick 3x3 box borders via border on cells */
.cell[data-col=“3”], .cell[data-col=“6”] { border-left: 2px solid #f5c542; }
.cell[data-row=“3”], .cell[data-row=“6”] { border-top: 2px solid #f5c542; }

.cell.given  { color: #f0ebe0; font-weight: 700; }
.cell.player { color: #f5c542; }
.cell.error  { color: #ff5f5f; background: #2e1f1f !important; }
.cell.selected { background: #3d3860 !important; }
.cell.peer   { background: #272631; }
.cell.same   { background: #322f4a; }

/* notes */
.notes-grid {
display: grid;
grid-template-columns: repeat(3,1fr);
grid-template-rows: repeat(3,1fr);
width: 100%;
height: 100%;
padding: 1px;
}
.note-cell {
display: flex;
align-items: center;
justify-content: center;
font-size: clamp(6px, 1.4vw, 8px);
font-weight: 500;
color: #a89ecd;
line-height: 1;
}

/* CONTROLS */
.controls {
width: 100%;
max-width: 420px;
display: flex;
justify-content: space-around;
padding: 10px 16px 4px;
}
.ctrl { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.ctrl-btn {
width: 48px;
height: 44px;
background: #2a2933;
border: none;
border-radius: 12px;
color: #f0ebe0;
font-size: 20px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.12s;
}
.ctrl-btn:active { transform: scale(0.88); }
.ctrl-btn.on { background: #f5c542; color: #1c1b22; }
.ctrl-label {
font-size: 9px;
font-weight: 600;
letter-spacing: 1px;
text-transform: uppercase;
color: #555;
}

/* NUMPAD */
.numpad {
width: 100%;
max-width: 420px;
display: grid;
grid-template-columns: repeat(9, 1fr);
gap: 5px;
padding: 6px 12px 24px;
}
.num-btn {
aspect-ratio: 1;
background: #2a2933;
border: none;
border-radius: 10px;
color: #f0ebe0;
font-size: clamp(15px, 4vw, 20px);
font-weight: 700;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.1s;
font-family: -apple-system, sans-serif;
}
.num-btn:active { transform: scale(0.88); background: #3a3650; }
.num-btn.done { opacity: 0.2; pointer-events: none; }

/* WIN */
#overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(28,27,34,0.96);
z-index: 50;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 12px;
padding: 40px;
}
#overlay.show { display: flex; }
.win-emoji { font-size: 60px; }
.win-title { font-size: 42px; font-weight: 800; color: #f5c542; letter-spacing: -1px; }
.win-sub { font-size: 13px; color: #888; letter-spacing: 2px; text-transform: uppercase; }
.win-time { font-size: 40px; font-weight: 300; color: #fff; letter-spacing: 3px; }
.win-btn {
margin-top: 12px;
background: #f5c542;
color: #1c1b22;
border: none;
border-radius: 14px;
padding: 16px 48px;
font-size: 14px;
font-weight: 800;
letter-spacing: 1px;
text-transform: uppercase;
cursor: pointer;
}
.win-btn:active { transform: scale(0.96); }
</style>

</head>
<body>

<div class="header">
  <div class="logo">Su<span>doku</span></div>
  <div class="timer-box">
    <div class="timer" id="timer">00:00</div>
    <div class="diff-label" id="dlabel">Médio</div>
  </div>
</div>

<div class="diff-row">
  <button class="diff-btn" data-d="easy"   onclick="setDiff('easy')">Fácil</button>
  <button class="diff-btn active" data-d="medium" onclick="setDiff('medium')">Médio</button>
  <button class="diff-btn" data-d="hard"   onclick="setDiff('hard')">Difícil</button>
</div>

<div class="stats">
  <div class="stat">Erros <b id="err">0</b></div>
  <div class="stat">Dicas <b id="hnt">3</b></div>
</div>

<div class="board-wrap"><div id="board"></div></div>

<div class="controls">
  <div class="ctrl">
    <button class="ctrl-btn" onclick="undo()">↩</button>
    <div class="ctrl-label">Voltar</div>
  </div>
  <div class="ctrl">
    <button class="ctrl-btn" onclick="erase()">⌫</button>
    <div class="ctrl-label">Apagar</div>
  </div>
  <div class="ctrl">
    <button class="ctrl-btn" id="noteBtn" onclick="toggleNotes()">✎</button>
    <div class="ctrl-label">Notas</div>
  </div>
  <div class="ctrl">
    <button class="ctrl-btn" onclick="hint()">💡</button>
    <div class="ctrl-label">Dica</div>
  </div>
  <div class="ctrl">
    <button class="ctrl-btn" onclick="newGame()">↺</button>
    <div class="ctrl-label">Novo</div>
  </div>
</div>

<div class="numpad" id="numpad"></div>

<div id="overlay">
  <div class="win-emoji">🏆</div>
  <div class="win-title">Parabéns!</div>
  <div class="win-sub">Tempo final</div>
  <div class="win-time" id="winTime">00:00</div>
  <div class="win-sub" id="winErr"></div>
  <button class="win-btn" onclick="newGame();document.getElementById('overlay').classList.remove('show')">Novo Jogo</button>
</div>

<script>
let puzzle=[],solution=[],given=[],notes=[],hist=[];
let sel=-1,noteMode=false,errs=0,hints=3,secs=0,iv;
let diff='medium';
const REMOVE={easy:36,medium:46,hard:54};

function gen(){
  const g=Array(81).fill(0);
  fill(g);
  const sol=[...g];
  const cells=shuf([...Array(81).keys()]);
  for(let i=0;i<REMOVE[diff];i++) g[cells[i]]=0;
  return{puzzle:g,solution:sol};
}
function fill(g){
  const e=g.indexOf(0);
  if(e<0)return true;
  for(const n of shuf([1,2,3,4,5,6,7,8,9])){
    if(ok(g,e,n)){g[e]=n;if(fill(g))return true;g[e]=0;}
  }
  return false;
}
function ok(g,i,n){
  const r=~~(i/9),c=i%9;
  for(let j=0;j<9;j++){
    if(g[r*9+j]===n||g[j*9+c]===n)return false;
    const br=3*~~(r/3)+~~(j/3),bc=3*~~(c/3)+j%3;
    if(g[br*9+bc]===n)return false;
  }
  return true;
}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function renderBoard(){
  const b=document.getElementById('board');
  b.innerHTML='';
  for(let i=0;i<81;i++){
    const d=document.createElement('div');
    d.className='cell';
    d.dataset.idx=i;
    d.dataset.row=~~(i/9);
    d.dataset.col=i%9;
    d.addEventListener('click',()=>pick(i));
    b.appendChild(d);
    paint(i);
  }
  countNums();
}

function paint(i){
  const d=document.querySelector(`.cell[data-idx="${i}"]`);
  if(!d)return;
  d.classList.remove('given','player','error');
  d.innerHTML='';
  const v=puzzle[i],nt=notes[i];
  if(v){
    d.textContent=v;
    if(given[i])d.classList.add('given');
    else if(v!==solution[i])d.classList.add('error');
    else d.classList.add('player');
  } else if(nt&&nt.some(Boolean)){
    const ng=document.createElement('div');
    ng.className='notes-grid';
    for(let n=1;n<=9;n++){
      const nc=document.createElement('div');
      nc.className='note-cell';
      nc.textContent=nt[n-1]?n:'';
      ng.appendChild(nc);
    }
    d.appendChild(ng);
  }
}

function hl(){
  const cells=document.querySelectorAll('.cell');
  const sr=sel>=0?~~(sel/9):-1,sc=sel>=0?sel%9:-1;
  const sb=sel>=0?(~~(sr/3)*3+~~(sc/3)):-1;
  const sv=sel>=0?puzzle[sel]:0;
  cells.forEach((d,i)=>{
    d.classList.remove('selected','peer','same');
    if(i===sel){d.classList.add('selected');return;}
    if(sel<0)return;
    const r=~~(i/9),c=i%9,bx=~~(r/3)*3+~~(c/3);
    if(r===sr||c===sc||bx===sb)d.classList.add('peer');
    if(sv&&puzzle[i]===sv)d.classList.add('same');
  });
}

function countNums(){
  const cnt=Array(10).fill(0);
  puzzle.forEach(v=>{if(v)cnt[v]++;});
  document.querySelectorAll('.num-btn').forEach(b=>{
    b.classList.toggle('done',cnt[+b.dataset.n]>=9);
  });
}

function pick(i){ sel=sel===i?-1:i; hl(); }

function input(n){
  if(sel<0||given[sel])return;
  if(noteMode){
    if(!puzzle[sel]){
      if(!notes[sel])notes[sel]=Array(9).fill(false);
      notes[sel][n-1]=!notes[sel][n-1];
      paint(sel);
    }
    return;
  }
  hist.push({i:sel,v:puzzle[sel],n:notes[sel]?[...notes[sel]]:null});
  if(puzzle[sel]===n){ puzzle[sel]=0; }
  else {
    const wasErr=puzzle[sel]&&puzzle[sel]!==solution[sel];
    puzzle[sel]=n;
    if(n!==solution[sel]&&!wasErr){
      errs++;
      document.getElementById('err').textContent=errs;
    }
    clrNotes(sel,n);
  }
  paint(sel);hl();countNums();checkWin();
}

function clrNotes(idx,n){
  const r=~~(idx/9),c=idx%9;
  for(let i=0;i<81;i++){
    const ir=~~(i/9),ic=i%9;
    if(ir===r||ic===c||(~~(ir/3)===~~(r/3)&&~~(ic/3)===~~(c/3))){
      if(notes[i])notes[i][n-1]=false;
    }
  }
}

function erase(){
  if(sel<0||given[sel])return;
  hist.push({i:sel,v:puzzle[sel],n:notes[sel]?[...notes[sel]]:null});
  puzzle[sel]=0;notes[sel]=Array(9).fill(false);
  paint(sel);hl();countNums();
}

function undo(){
  if(!hist.length)return;
  const p=hist.pop();
  puzzle[p.i]=p.v;notes[p.i]=p.n||Array(9).fill(false);
  paint(p.i);hl();countNums();
}

function toggleNotes(){
  noteMode=!noteMode;
  document.getElementById('noteBtn').classList.toggle('on',noteMode);
}

function hint(){
  if(hints<=0)return;
  const emp=[];
  for(let i=0;i<81;i++) if(!given[i]&&puzzle[i]!==solution[i])emp.push(i);
  if(!emp.length)return;
  const idx=emp[~~(Math.random()*emp.length)];
  hist.push({i:idx,v:puzzle[idx],n:notes[idx]?[...notes[idx]]:null});
  puzzle[idx]=solution[idx];notes[idx]=Array(9).fill(false);
  hints--;document.getElementById('hnt').textContent=hints;
  paint(idx);sel=idx;hl();countNums();checkWin();
}

function startTimer(){
  clearInterval(iv);secs=0;
  iv=setInterval(()=>{ secs++; document.getElementById('timer').textContent=fmt(secs); },1000);
}

function fmt(s){ return String(~~(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

function checkWin(){
  for(let i=0;i<81;i++) if(puzzle[i]!==solution[i])return;
  clearInterval(iv);
  document.getElementById('winTime').textContent=fmt(secs);
  document.getElementById('winErr').textContent=errs===0?'Sem erros 🎉':errs+(errs===1?' erro':' erros');
  setTimeout(()=>document.getElementById('overlay').classList.add('show'),500);
}

function setDiff(d){
  diff=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.d===d));
  document.getElementById('dlabel').textContent={easy:'Fácil',medium:'Médio',hard:'Difícil'}[d];
  newGame();
}

function newGame(){
  const{puzzle:p,solution:s}=gen();
  puzzle=[...p];solution=[...s];
  given=puzzle.map(v=>v!==0);
  notes=Array(81).fill(null).map(()=>Array(9).fill(false));
  hist=[];sel=-1;errs=0;hints=3;
  document.getElementById('err').textContent=0;
  document.getElementById('hnt').textContent=3;
  renderBoard();startTimer();
}

// numpad
(function(){
  const np=document.getElementById('numpad');
  for(let n=1;n<=9;n++){
    const b=document.createElement('button');
    b.className='num-btn';b.dataset.n=n;b.textContent=n;
    b.addEventListener('click',()=>input(n));
    np.appendChild(b);
  }
})();

newGame();
</script>

</body>
</html>
